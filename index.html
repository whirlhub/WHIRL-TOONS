<!DOCTYPE html>
<html>
<head>
  <title>Voice Loop Beat Maker V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0a0a0a; color:#00ff88; text-align:center; font-family: sans-serif; padding-top: 50px;}
    h1 { text-shadow: 0 0 10px #00ff88; }
    button { background: #00ff88; color: #000; border: none; padding: 20px 40px; margin: 10px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer;}
    button:disabled { background: #333; color: #666; }
    #status { margin-top: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🎤 VOICE LOOP MAKER V2</h1>
  <p>1. Record 2. Play 3. Stop</p>
  
  <button id="record">🔴 RECORD 3s</button>
  <button id="play" disabled>▶️ PLAY LOOP</button>
  <button id="stop" disabled>⏹️ STOP</button>
  <div id="status">Status: Tap to start</div>

<script>
let audioContext;
let recordedBuffer;
let loopSource;
const recordBtn = document.getElementById('record');
const playBtn = document.getElementById('play');
const stopBtn = document.getElementById('stop');
const status = document.getElementById('status');

recordBtn.onclick = async () => {
  if(!audioContext) audioContext = new AudioContext();
  
  status.innerText = "Status: Recording... Make some noise!";
  recordBtn.disabled = true;
  
  const stream = await navigator.mediaDevices.getUserMedia({audio: true});
  const mic = audioContext.createMediaStreamSource(stream);
  const recorder = audioContext.createScriptProcessor(4096, 1, 1);
  const audioData = [];
  
  recorder.onaudioprocess = e => {
    audioData.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  
  mic.connect(recorder);
  recorder.connect(audioContext.destination);
  
  setTimeout(() => {
    recorder.disconnect();
    mic.disconnect();
    stream.getTracks().forEach(track => track.stop());
    
    // Combine all the audio chunks
    let length = audioData.reduce((acc, arr) => acc + arr.length, 0);
    let result = new Float32Array(length);
    let offset = 0;
    audioData.forEach(arr => { result.set(arr, offset); offset += arr.length; });
    
    recordedBuffer = audioContext.createBuffer(1, result.length, audioContext.sampleRate);
    recordedBuffer.getChannelData(0).set(result);
    
    status.innerText = "Status: Got it! Hit PLAY LOOP";
    recordBtn.disabled = false;
    playBtn.disabled = false;
  }, 3000);
};

playBtn.onclick = () => {
  if(!recordedBuffer) return;
  stopLoop();
  
  loopSource = audioContext.createBufferSource();
  loopSource.buffer = recordedBuffer;
  loopSource.loop = true; // THIS is the key - real looping
  loopSource.connect(audioContext.destination);
  loopSource.start();
  
  status.innerText = "Status: LOOPING...";
  playBtn.disabled = true;
  stopBtn.disabled = false;
};

stopBtn.onclick = () => {
  stopLoop();
  status.innerText = "Status: Stopped";
  playBtn.disabled = false;
  stopBtn.disabled = true;
};

function stopLoop(){
  if(loopSource){
    loopSource.stop();
    loopSource.disconnect();
    loopSource = null;
  }
}
</script>
</body>
  </html>
