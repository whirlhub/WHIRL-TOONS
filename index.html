<!DOCTYPE html>
<html>
<head>
<title>WHIRL TOONS DRAMA CAST</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0f1123;color:white;text-align:center;font-family:Arial;padding:8px}
button{margin:4px;padding:10px 14px;font-size:14px;border:none;border-radius:10px;background:#8b5cf6;color:white;font-weight:bold}
#stage{width:98%;height:450px;margin:10px auto;background:#fff;border:4px solid #8b5cf6;position:relative;overflow:hidden}
.char{width:60px;height:100px;position:absolute;font-size:45px;text-align:center;transition: all 0.4s}
.bubble{position:absolute;background:#fff;border:2px solid #000;border-radius:15px;padding:6px 10px;color:#000;font-size:13px;font-weight:bold;max-width:120px;z-index:10}
.z{position:absolute;bottom:10px;right:20px;font-size:30px;display:none} /* for sleeping Zzz */
</style>
</head>
<body>
<h2>🌀 WHIRL TOONS DRAMA CAST</h2>

<button onclick="addMany()">Add 5 Characters</button>
<button onclick="makeFeel()">Make Them Feel</button>
<button onclick="makeTalk()">Conversation</button>
<button onclick="makeSleep()">Make Them Sleep</button>
<button onclick="clearAll()">Reset</button>

<div id="stage"></div>

<script>
let stage = document.getElementById('stage');
let cast = [];
let faces = ['😀','😢','😡','😍','😴','😮','🥺','😂'];

function addMany(){
  stage.innerHTML = '';
  cast = [];
  let names = ['😀','😢','😡','😍','😴']; // 5 different chars
  for(let i=0;i<5;i++){
    let d = document.createElement('div');
    d.className = 'char';
    d.innerHTML = names[i];
    d.style.left = (i*65+20)+'px'; // spread them out
    d.style.top = '200px';
    d.id = 'char'+i;
    stage.appendChild(d);

    // add Zzz for sleep
    let z = document.createElement('div');
    z.className = 'z';
    z.id = 'z'+i;
    z.innerHTML = '💤';
    stage.appendChild(z);

    cast.push(d);
  }
}

function makeFeel(){ // FEEL + CRY
  cast.forEach((c,i)=>{
    setTimeout(()=>{
      let emotions = ['😢','😡','😍','🥺','😂'];
      c.innerHTML = emotions[i];
      c.style.top = '220px'; // slight bounce = feeling

      // if crying, add tears
      if(c.innerHTML=='😢'){
        let tear = document.createElement('div');
        tear.innerHTML = '💧';
        tear.style.position='absolute';
        tear.style.left = parseInt(c.style.left)+30+'px';
        tear.style.top = parseInt(c.style.top)+40+'px';
        tear.style.fontSize='20px';
        stage.appendChild(tear);
        setTimeout(()=>tear.remove(),2000);
      }
    }, i*300);
  });
}

function makeTalk(){ // TALK TO EACH OTHER
  if(cast.length==0) return;
  let messages = ["I'm sad bro","Cheer up!","I’m angry!","I love you guys","Let's sleep"];

  cast.forEach((c,i)=>{
    setTimeout(()=>{
      // speech bubble
      let b = document.createElement('div');
      b.className = 'bubble';
      b.innerText = messages[i];
      b.style.left = parseInt(c.style.left)-20+'px';
      b.style.top = parseInt(c.style.top)-50+'px';
      stage.appendChild(b);

      // mouth open
      c.innerHTML = '😮';
      setTimeout(()=>{
        c.innerHTML = faces[i]; // back to face
        b.remove();
      },2000);
    }, i*2500); // each talks one by one
  });
}

function makeSleep(){ // SLEEP
  cast.forEach((c,i)=>{
    c.innerHTML = '😴';
    c.style.top = '250px'; // lay down
    document.getElementById('z'+i).style.display='block';
    document.getElementById('z'+i).style.left = parseInt(c.style.left)+20+'px';
    document.getElementById('z'+i).style.top = parseInt(c.style.top)-30+'px';
  });
}

function clearAll(){
  stage.innerHTML = '';
  cast = [];
}
</script>
</body>
  </html>
