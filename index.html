<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHIRL MESSENGER</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto}
  body{background:#fff;height:100vh;display:flex;flex-direction:column}
  header{background:#0084ff;color:#fff;padding:12px;text-align:center;font-weight:bold;font-size:18px}
  #chatList{flex:1;overflow-y:auto;background:#f0f2f5}
.contact{display:flex;padding:12px;border-bottom:1px solid #ddd;cursor:pointer}
.contact:hover{background:#e4e6eb}
.avatar{width:50px;height:50px;border-radius:50%;background:#0084ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:10px;font-size:18px}
.info{flex:1}
.name{font-weight:600;font-size:16px}
.last{color:#65676b;font-size:13px}
  #chatBox{display:none;flex-direction:column;height:100vh}
.chatHeader{background:#0084ff;color:#fff;padding:12px;display:flex;align-items:center}
.back{margin-right:10px;cursor:pointer;font-size:20px}
  #messages{flex:1;overflow-y:auto;padding:10px;background:#e5ddd5;display:flex;flex-direction:column}
.bubble{max-width:70%;padding:10px 14px;margin:6px 0;border-radius:18px}
.me{background:#0084ff;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.them{background:#fff;color:#000;align-self:flex-start;border-bottom-left-radius:4px}
.inputBar{display:flex;padding:8px;background:#fff;border-top:1px solid #ddd;position:sticky;bottom:0}
.inputBar input{flex:1;border:none;padding:10px;border-radius:20px;background:#f0f2f5;outline:none}
.inputBar button{background:#0084ff;color:#fff;border:none;padding:10px 16px;border-radius:50%;margin-left:8px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<header>⚡ WHIRL MESSENGER</header>

<div id="chatList">
  <div class="contact" onclick="addContact()">
    <div class="avatar">+</div>
    <div class="info">
      <div class="name">Add New Contact</div>
      <div class="last">Save Name + WHIRL ID</div>
    </div>
  </div>
</div>

<div id="chatBox">
  <div class="chatHeader">
    <span class="back" onclick="back()">←</span>
    <span id="chatWith">Contact</span>
  </div>
  <div id="messages"></div>
  <div class="inputBar">
    <input id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
let currentChat = null;
let myID = localStorage.getItem("whirlMyID") || "1";
let myName = localStorage.getItem("whirlMyName") || "Me";
let contacts = JSON.parse(localStorage.getItem("whirlContacts") || "[]");
let chats = JSON.parse(localStorage.getItem("whirlChats") || "{}");

function loadContacts(){
  let list = document.getElementById('chatList');
  let addBtn = list.lastElementChild;
  list.innerHTML = '';
  contacts.forEach(c=>{
    let div = document.createElement('div');
    div.className='contact';
    div.onclick=()=>openChat(c.id, c.name);
    div.innerHTML=`<div class="avatar">${c.name[0].toUpperCase()}</div><div class="info"><div class="name">${c.name}</div><div class="last">Tap to message</div></div>`;
    list.appendChild(div);
  });
  list.appendChild(addBtn);
}

function openChat(id, name){
  currentChat = id;
  document.getElementById('chatList').style.display='none';
  document.getElementById('chatBox').style.display='flex';
  document.getElementById('chatWith').innerText = name;
  renderMessages();
}

function back(){
  document.getElementById('chatList').style.display='block';
  document.getElementById('chatBox').style.display='none';
}

function send(){
  let text = document.getElementById('msgInput').value;
  if(!text) return;
  if(!chats[currentChat]) chats[currentChat] = [];
  chats[currentChat].push({from:myID, text:text, time:Date.now()});
  localStorage.setItem("whirlChats", JSON.stringify(chats));
  document.getElementById('msgInput').value='';
  renderMessages();
}

function renderMessages(){
  let box = document.getElementById('messages');
  box.innerHTML='';
  (chats[currentChat]||[]).forEach(m=>{
    let div = document.createElement('div');
    div.className = 'bubble ' + (m.from==myID? 'me' : 'them');
    div.innerText = m.text;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function addContact(){
  let name = prompt("Enter their NAME:");
  let id = prompt("Enter their WHIRL ID number:");
  if(name && id){
    contacts.push({name:name, id:id});
    localStorage.setItem("whirlContacts", JSON.stringify(contacts));
    loadContacts();
  }
}

if(!localStorage.getItem("whirlMyID")){
  let id = prompt("Welcome to WHIRL! Claim your ID number:");
  let name = prompt("What's your NAME?");
  localStorage.setItem("whirlMyID", id || "1");
  localStorage.setItem("whirlMyName", name || "Me");
  location.reload();
}

loadContacts();
</script>
</body>
   </html>
