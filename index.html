<!DOCTYPE html>
<html>
<head>
  <title>Voice Loop Beat Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      background:#0a0a0a; 
      color:#00ff88; 
      text-align:center; 
      font-family: 'Arial Black', sans-serif;
      padding-top: 50px;
    }
    h1 { font-size: 2.5em; text-shadow: 0 0 10px #00ff88; }
    button { 
      background: #00ff88; 
      color: #000; 
      border: none; 
      padding: 20px 40px; 
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover { background: #00cc6a; }
    #status { margin-top: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🎤 VOICE LOOP MAKER</h1>
  <p>Record a sound, then make it a beat</p>
  
  <button id="record">🔴 RECORD</button>
  <button id="play">▶️ PLAY LOOP</button>
  <button id="stop">⏹️ STOP</button>
  <div id="status">Status: Ready</div>

<script>
let audioContext;
let recordedBuffer;
let isRecording = false;
let recorder;
let loopInterval;
const status = document.getElementById('status');

document.getElementById('record').onclick = async () => {
  if(!audioContext) audioContext = new AudioContext();
  
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    recorder = new MediaRecorder(stream);
    let chunks = [];
    
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = async () => {
      const blob = new Blob(chunks);
      const arrayBuffer = await blob.arrayBuffer();
      recordedBuffer = await audioContext.decodeAudioData(arrayBuffer);
      status.innerText = "Status: Got your sound! Hit PLAY LOOP";
      document.getElementById('record').innerText = "🔴 RECORD";
    };
    
    recorder.start();
    isRecording = true;
    status.innerText = "Status: Recording for 3 seconds...";
    document.getElementById('record').innerText = "🔴 RECORDING";
    
    setTimeout(() => { 
      if(isRecording) {
        recorder.stop(); 
        isRecording=false; 
      }
    }, 3000);
  }
};

document.getElementById('play').onclick = () => {
  if(!recordedBuffer) return status.innerText = "Status: Record something first!";
  clearInterval(loopInterval);
  status.innerText = "Status: LOOPING...";
  loopInterval = setInterval(() => {
    const source = audioContext.createBufferSource();
    source.buffer = recordedBuffer;
    source.connect(audioContext.destination);
    source.start();
  }, 500); // 500ms = 120 BPM. Change to 400 for faster
};

document.getElementById('stop').onclick = () => {
  clearInterval(loopInterval);
  status.innerText = "Status: Stopped";
};
</script>
</body>
  </html>
