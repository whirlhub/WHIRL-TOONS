<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WHIRL TOONS PRO</title>
<style>
  :root{--bg:#0a0a1a;--panel:#12122a;--accent:#8b5cf6;--accent2:#10b981}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{display:flex;height:100vh;background:var(--bg);color:#fff;overflow:hidden}
  #sidebar{width:300px;background:var(--panel);padding:20px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
  #sidebar h1{font-size:24px;color:var(--accent);text-align:center;margin-bottom:10px}
 .btn{padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
 .btn:hover{filter:brightness(1.2)}
 .btn.alt{background:var(--accent2)}
 .parts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
 .parts button{padding:8px;font-size:12px}
  #stage-wrap{flex:1;display:grid;place-items:center;background:#000}
  #stage{background:#fff;border-radius:16px;box-shadow:0 0 50px rgba(139,92,246,0.4)}
  input{width:100%;padding:10px;border-radius:8px;border:none;background:#1f1f3a;color:#fff}
  label{font-size:12px;color:#aaa}
</style>
</head>
<body>

<div id="sidebar">
  <h1>🌀 WHIRL TOONS PRO</h1>
  <button class="btn" onclick="addCharacter()">+ New Character</button>

  <label>Character Parts</label>
  <div class="parts">
    <button onclick="setPart('head','round')">Round Head</button>
    <button onclick="setPart('head','square')">Square Head</button>
    <button onclick="setPart('hair','short')">Short Hair</button>
    <button onclick="setPart('hair','spike')">Spiky Hair</button>
    <button onclick="setPart('shirt','tee')">T-Shirt</button>
    <button onclick="setPart('shirt','hoodie')">Hoodie</button>
  </div>

  <button class="btn" onclick="addBubble()">+ Speech Bubble</button>
  <label>Dialogue - Type + Press Enter for LipSync</label>
  <input type="text" id="dialogue" onkeydown="if(event.key==='Enter')speak()">

  <label>Background</label>
  <button class="btn alt" onclick="changeBG()">Change BG</button>

  <button class="btn alt" onclick="exportPNG()">⬇ Export PNG</button>
  <button class="btn alt" onclick="exportVideo()">🎬 Export 5s Video</button>
</div>

<div id="stage-wrap">
  <svg id="stage" width="1000" height="700"></svg>
</div>

<script>
const stage = document.getElementById('stage');
let selected = null;
let bgList = [
  {name:'City', fill:'url(#city)'},
  {name:'Forest', fill:'url(#forest)'},
  {name:'Space', fill:'url(#space)'},
  {name:'Classroom', fill:'url(#class)'},
  {name:'Beach', fill:'url(#beach)'}
];
let bgIndex = 0;

// A. CHARACTER PARTS SYSTEM
function addCharacter(){
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("transform","translate(500,350)");
  g.dataset.head="round"; g.dataset.hair="short"; g.dataset.shirt="tee";

  g.innerHTML = `
    <g class="hair"></g>
    <circle class="head" r="35" fill="url(#skin)"/>
    <circle cx="-10" cy="-5" r="4" fill="#000"/><circle cx="10" cy="-5" r="4" fill="#000"/>
    <path class="mouth" d="M-12 8 Q0 16 12 8" stroke="#000" fill="none" stroke-width="2"/>
    <rect class="shirt" x="-20" y="35" width="40" height="70" rx="10" fill="url(#shirt)"/>
  `;
  stage.appendChild(g);
  makeDraggable(g);
  selected = g;
  updateParts(g);
}

function setPart(type,val){
  if(!selected) return;
  selected.dataset[type]=val;
  updateParts(selected);
}

function updateParts(el){
  // Hair
  const hair = el.querySelector('.hair');
  if(el.dataset.hair==='spike') hair.innerHTML='<path d="M-20,-30 L-10,-50 L0,-30 L10,-50 L20,-30" fill="#333"/>';
  else hair.innerHTML='<ellipse cx="0" cy="-40" rx="38" ry="15" fill="#333"/>';

  // Head shape
  const head = el.querySelector('.head');
  if(el.dataset.head==='square'){head.setAttribute('rx','10'); head.setAttribute('ry','10');}
  else {head.removeAttribute('rx'); head.removeAttribute('ry');}

  // Shirt
  const shirt = el.querySelector('.shirt');
  if(el.dataset.shirt==='hoodie'){shirt.setAttribute('rx','5'); shirt.setAttribute('fill','#555');}
  else {shirt.setAttribute('rx','10'); shirt.setAttribute('fill','url(#shirt)');}
}

// B. 5 BACKGROUNDS
function changeBG(){
  bgIndex = (bgIndex+1)%bgList.length;
  document.getElementById('bg-rect').setAttribute('fill', bgList[bgIndex].fill);
}

// C. AUTO LIP-SYNC
function speak(){
  const text = document.getElementById('dialogue').value;
  if(!selected ||!text) return;
  const mouth = selected.querySelector('.mouth');
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.1;

  let i=0;
  utter.onboundary = () => {
    mouth.setAttribute('d', i%2===0? 'M-15 8 Q0 22 15 8' : 'M-12 8 Q0 10 12 8'); // open/close
    i++;
  }
  utter.onend = () => mouth.setAttribute('d','M-12 8 Q0 16 12 8'); // smile
  speechSynthesis.speak(utter);
}

// DRAG
function makeDraggable(el){
  let dragging=false;
  el.onpointerdown=()=>{dragging=true; selected=el;}
  stage.onpointermove=e=>{
    if(!dragging) return;
    const pt=stage.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const p=pt.matrixTransform(stage.getScreenCTM().inverse());
    el.setAttribute("transform",`translate(${p.x},${p.y})`);
  }
  window.onpointerup=()=>dragging=false;
}

// EXPORT
function exportPNG(){
  const svgData=new XMLSerializer().serializeToString(stage);
  const img=new Image();
  img.onload=()=>{const c=document.createElement('canvas');c.width=1000;c.height=700;c.getContext('2d').drawImage(img,0,0);
    const a=document.createElement('a');a.download='whirl-toons-pro.png';a.href=c.toDataURL();a.click();}
  img.src='data:image/svg+xml;base64,'+btoa(svgData);
}
function exportVideo(){
  const stream=stage.captureStream(30); const rec=new MediaRecorder(stream);
  let chunks=[]; rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(chunks));a.download='whirl-toons-pro.webm';a.click();}
  rec.start(); setTimeout(()=>rec.stop(),5000);
}

// INIT: DEFS + BG
window.onload=()=>{
  stage.innerHTML=`
  <rect id="bg-rect" width="1000" height="700" fill="url(#city)"/>
  <defs>
    <linearGradient id="skin"><stop offset="0" stop-color="#ffe0ac"/><stop offset="1" stop-color="#ffcd94"/></linearGradient>
    <linearGradient id="shirt"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <pattern id="city" patternUnits="userSpaceOnUse" width="100" height="100"><rect fill="#87ceeb" width="100" height="100"/><rect x="10" y="40" width="20" height="60" fill="#555"/><rect x="40" y="20" width="20" height="80" fill="#777"/><rect x="70" y="50" width="20" height="50" fill="#444"/></pattern>
    <pattern id="forest" patternUnits="userSpaceOnUse" width="100" height="100"><rect fill="#228b22" width="100" height="100"/><circle cx="20" cy="30" r="15" fill="#006400"/><circle cx="60" cy="40" r="20" fill="#006400"/><circle cx="80" cy="25" r="12" fill="#006400"/></pattern>
    <pattern id="space" patternUnits="userSpaceOnUse" width="100" height="100"><rect fill="#000" width="100" height="100"/><circle cx="10" cy="10" r="1" fill="#fff"/><circle cx="50" cy="30" r="1" fill="#fff"/><circle cx="80" cy="70" r="1" fill="#fff"/></pattern>
    <pattern id="class" patternUnits="userSpaceOnUse" width="100" height="100"><rect fill="#f5deb3" width="100" height="100"/><rect y="80" width="100" height="20" fill="#8b4513"/></pattern>
    <pattern id="beach" patternUnits="userSpaceOnUse" width="100" height="100"><rect fill="#87ceeb" width="100" height="50"/><rect y="50" fill="#f4e2d8" width="100" height="50"/></pattern>
  </defs>`;
}
</script>
</body>
</html>
