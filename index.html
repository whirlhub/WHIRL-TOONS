<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZedPDF Merger</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; background: #f5f5f5; }
    h1 { color: #2c3e50; }
    #dropzone { border: 3px dashed #3498db; padding: 40px; margin: 20px; background: white; cursor: pointer; }
    button { padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <h1>ZedPDF Merger 🇿🇲</h1>
  <p>Drag and drop your PDFs. Merge them for HELSB, Jobs, School etc.</p>
  
  <div id="dropzone">Drop PDFs here or click to select</div>
  <input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
  <br><br>
  <button onclick="mergePDFs()">Merge PDFs</button>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    let files = [];

    dropzone.onclick = () => fileInput.click();
    
    fileInput.onchange = e => files = [...e.target.files];
    
    dropzone.ondrop = e => {
      e.preventDefault();
      files = [...e.dataTransfer.files];
      dropzone.innerText = `${files.length} file(s) selected`;
    }
    dropzone.ondragover = e => e.preventDefault();

    async function mergePDFs() {
      if(files.length < 2) return alert("Select at least 2 PDFs bro");
      
      const { PDFDocument } = PDFLib;
      const mergedPdf = await PDFDocument.create();

      for(const file of files) {
        const pdfBytes = await file.arrayBuffer();
        const pdf = await PDFDocument.load(pdfBytes);
        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        pages.forEach(page => mergedPdf.addPage(page));
      }

      const mergedBytes = await mergedPdf.save();
      const blob = new Blob([mergedBytes], {type: 'application/pdf'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'Merged_Document.pdf';
      link.click();
    }
  </script>
</body>
  </html>
