<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHIRLSTOR IR v2 - Global Command Center</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0a0f1e, #1a2a4a, #2c3e50);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
  }
  header {
    text-align: center;
    padding: 1.5rem;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(15px);
    border-bottom: 2px solid #00d4ff;
  }
  header h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg, #00d4ff, #ff00ff, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .layout {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1rem;
    padding: 1rem;
    height: 90vh;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 15px;
    padding: 1rem;
    backdrop-filter: blur(15px);
  }
  #map { height: 100%; border-radius: 15px; }
  #news { overflow-y: auto; }
  .news-item {
    padding: 0.8rem;
    margin-bottom: 0.8rem;
    background: rgba(0,212,255,0.1);
    border-left: 3px solid #00d4ff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  .news-item:hover { background: rgba(0,212,255,0.2); }
  #timeline {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    z-index: 1000;
  }
  input[type=range] { width: 100%; }
</style>
</head>
<body>
  <header>
    <h1>WHIRLSTOR IR 🌍</h1>
    <p>Live News • Interactive Map • History: 1 AD → 2026</p>
  </header>

  <div class="layout">
    <div class="card" style="position: relative;">
      <h2>World Map</h2>
      <div id="map"></div>
      <div id="timeline">
        <label>History Timeline: <span id="yearLabel">2026</span></label>
        <input type="range" id="yearSlider" min="1" max="2026" value="2026">
      </div>
    </div>

    <div class="card" id="news">
      <h2>Live IR News</h2>
      <div id="newsFeed">Loading news...</div>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1. MAP
  const map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // Example countries - we can add real IR data here
  const countries = [
    {name: "USA", coords: [37.8, -96], info: "NATO, UN Security Council"},
    {name: "China", coords: [35, 104], info: "BRICS, Belt and Road"},
    {name: "Russia", coords: [61, 105], info: "CSTO, Nuclear Power"},
    {name: "Zambia", coords: [-13.1, 27.8], info: "SADC, Non-Aligned"},
  ];
  countries.forEach(c => {
    L.marker(c.coords).addTo(map)
     .bindPopup(`<b>${c.name}</b><br>${c.info}`);
  });

  // 2. HISTORY TIMELINE
  const yearSlider = document.getElementById('yearSlider');
  const yearLabel = document.getElementById('yearLabel');
  const historyData = {
    1914: "WW1 Begins",
    1945: "UN Founded",
    1991: "USSR Collapses",
    2001: "9/11 & War on Terror",
    2022: "Russia-Ukraine War"
  };
  yearSlider.oninput = () => {
    yearLabel.innerText = yearSlider.value;
    const event = historyData[yearSlider.value] || "No major event recorded";
    alert(`${yearSlider.value}: ${event}`); // later: show on map
  }

  // 3. LIVE NEWS - using free NewsAPI placeholder
  async function loadNews() {
    // Replace YOUR_API_KEY with a free key from newsapi.org
    const url = `https://newsapi.org/v2/everything?q=diplomacy OR treaty OR UN&language=en&apiKey=YOUR_API_KEY`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const feed = document.getElementById('newsFeed');
      feed.innerHTML = data.articles.slice(0,10).map(a => `
        <div class="news-item" onclick="window.open('${a.url}')">
          <b>${a.source.name}</b><br>
          ${a.title}
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('newsFeed').innerHTML = "Add your free NewsAPI key to go live 🔑";
    }
  }
  loadNews();
</script>
</body>
   </html>
