<!DOCTYPE html>
<html>
<head>
<title>WHIRL TOONS LITE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{margin:0;background:#111;color:#fff;font-family:sans-serif}
  #tools{padding:10px;background:#222;display:flex;gap:8px;flex-wrap:wrap}
  button{padding:10px;border:none;border-radius:8px;background:#7f5af0;color:#fff;font-weight:bold}
  #canvas{width:100%;height:70vh;background:#fff;display:block;border-top:3px solid #7f5af0}
</style>
</head>
<body>
<div id="tools">
  <h3 style="width:100%;margin:0;color:#7f5af0">🌀 WHIRL TOONS LITE</h3>
  <button onclick="addChar()">😀 Add Char</button>
  <button onclick="addText()">💬 Text</button>
  <button onclick="changeBG()">🎨 BG</button>
  <button onclick="save()">⬇ Save</button>
</div>
<canvas id="canvas"></canvas>

<script>
const c=document.getElementById('canvas');
const ctx=c.getContext('2d');
c.width=window.innerWidth; c.height=window.innerHeight*0.7;
let bg=0; let bgs=['#fff','#e0f2ff','#fff0f5','#e0ffe0'];

function addChar(){
  ctx.fillStyle='#ffd93d';
  ctx.beginPath(); ctx.arc(150,150,30,0,Math.PI*2); ctx.fill(); // head
  ctx.fillStyle='#7f5af0';
  ctx.fillRect(130,180,40,60); // body
}
function addText(){
  let t=prompt("What to say?");
  ctx.fillStyle='#000'; ctx.font='20px Comic Sans MS';
  ctx.fillText(t, 100, 100);
}
function changeBG(){
  bg=(bg+1)%bgs.length;
  ctx.fillStyle=bgs[bg];
  ctx.fillRect(0,0,c.width,c.height);
}
function save(){
  let a=document.createElement('a');
  a.download='whirl-toons-lite.png';
  a.href=c.toDataURL(); a.click();
}
changeBG(); // start with white bg
</script>
</body>
  </html>
