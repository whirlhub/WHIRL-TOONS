<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NF VOCAL STUDIO</title>
<style>
  body { background:#050505; color:#eee; font-family: 'Impact', sans-serif; text-align:center; padding:40px; }
  h1 { color:#d90429; letter-spacing:3px; font-size:40px; }
  button { background:#d90429; border:none; padding:18px 40px; margin:10px; border-radius:5px; 
           color:#fff; font-size:18px; cursor:pointer; font-weight:bold; }
  button:hover { background:#ef233c; }
  .knob { display:inline-block; margin:15px; }
  input[type=range] { width:140px; accent-color:#d90429; }
  label { display:block; font-size:11px; color:#aaa; text-transform:uppercase; }
  #status { margin-top:20px; color:#8ecae6; }
</style>
</head>
<body>
  <h1>NF VOCAL STUDIO</h1>
  <p>Raw. Aggressive. Upfront.</p>
  
  <button id="recordBtn">● RECORD</button>
  <button id="stopBtn" disabled>■ STOP</button>
  <a id="download" style="display:none; color:#8ecae6;"></a>
  
  <div>
    <div class="knob">
      <input type="range" id="comp" min="4" max="20" step="1" value="12">
      <label>Compression</label>
    </div>
    <div class="knob">
      <input type="range" id="reverb" min="0" max="0.25" step="0.01" value="0.08">
      <label>Room Reverb</label>
    </div>
    <div class="knob">
      <input type="range" id="delay" min="0" max="0.3" step="0.01" value="0.12">
      <label>Slap Delay</label>
    </div>
    <div class="knob">
      <input type="range" id="eq" min="0" max="12" step="1" value="6">
      <label>Presence 5kHz</label>
    </div>
  </div>
  
  <div id="status">Press RECORD</div>

<script>
let audioCtx, mediaStream, recorder, chunks = [];
let compNode, reverbNode, delayNode, eqNode, inputNode;

async function initAudio() {
  audioCtx = new AudioContext();
  mediaStream = await navigator.mediaDevices.getUserMedia({audio: {echoCancellation: false, noiseSuppression: false}});
  inputNode = audioCtx.createMediaStreamSource(mediaStream);
  
  // 1. NF EQ - cut mud, boost presence
  eqNode = audioCtx.createBiquadFilter();
  eqNode.type = "peaking";
  eqNode.frequency.value = 5000;
  eqNode.Q.value = 1;
  eqNode.gain.value = 6; // that clear NF vocal
  
  let lowCut = audioCtx.createBiquadFilter();
  lowCut.type = "highpass";
  lowCut.frequency.value = 80; // remove rumble
  
  // 2. HEAVY COMPRESSION - NF is always in your face
  compNode = audioCtx.createDynamicsCompressor();
  compNode.threshold.value = -18;
  compNode.knee.value = 20;
  compNode.ratio.value = 12; // aggressive
  compNode.attack.value = 0.003;
  compNode.release.value = 0.1;
  
  // 3. SMALL ROOM REVERB - NF uses very little
  reverbNode = audioCtx.createConvolver();
  let res = await fetch('https://cdn.jsdelivr.net/gh/mohayonao/web-audio-convolver@master/impulses/irroom.wav');
  let buf = await res.arrayBuffer();
  reverbNode.buffer = await audioCtx.decodeAudioData(buf);
  
  // 4. SLAP DELAY - 120ms for thickness
  delayNode = audioCtx.createDelay();
  delayNode.delayTime.value = 0.12;
  let feedback = audioCtx.createGain();
  feedback.gain.value = 0.15;
  delayNode.connect(feedback).connect(delayNode);
  
  // MIX
  let dryGain = audioCtx.createGain();
  let wetGain = audioCtx.createGain();
  dryGain.gain.value = 1;
  wetGain.gain.value = 0.08;
  
  inputNode.connect(lowCut).connect(eqNode).connect(compNode);
  compNode.connect(dryGain);
  compNode.connect(reverbNode).connect(wetGain);
  compNode.connect(delayNode).connect(wetGain);
  dryGain.connect(audioCtx.destination);
  wetGain.connect(audioCtx.destination);
  
  // Controls
  document.getElementById('comp').oninput = e => compNode.ratio.value = e.target.value;
  document.getElementById('reverb').oninput = e => wetGain.gain.value = e.target.value;
  document.getElementById('delay').oninput = e => delayNode.delayTime.value = e.target.value;
  document.getElementById('eq').oninput = e => eqNode.gain.value = e.target.value;
}

initAudio();

document.getElementById('recordBtn').onclick = () => {
  chunks = [];
  recorder = new MediaRecorder(mediaStream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    let blob = new Blob(chunks, {type: 'audio/webm'});
    let url = URL.createObjectURL(blob);
    let dl = document.getElementById('download');
    dl.href = url;
    dl.download = 'NF-take.webm';
    dl.style.display = 'inline-block';
    dl.textContent = '⬇ DOWNLOAD TAKE';
  };
  recorder.start();
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('status').textContent = 'Recording... Spit that truth';
};

document.getElementById('stopBtn').onclick = () => {
  recorder.stop();
  document.getElementById('recordBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('status').textContent = 'Done. Exported.';
};
</script>
</body>
        </html>
