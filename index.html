<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NF VOCAL STUDIO</title>
<style>
  body { background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; padding:50px; }
  h1 { color:#ff1a1a; font-size:42px; letter-spacing:2px; }
  button { background:#ff1a1a; border:none; padding:20px 50px; margin:15px; font-size:20px; 
           color:#fff; font-weight:bold; border-radius:8px; cursor:pointer; }
  button:hover { background:#ff3333; }
  button:disabled { background:#333; cursor:not-allowed; }
  #dl { display:block; margin-top:20px; font-size:18px; color:#00ff88; text-decoration:none; }
</style>
</head>
<body>
  <h1>NF VOCAL STUDIO</h1>
  <p>Press Record. Spit. Get WAV.</p>
  
  <button id="record">● RECORD</button>
  <button id="stop" disabled>■ STOP</button>
  <a id="dl"></a>
  <p id="status">Ready</p>

<script>
let audioCtx, mediaRecorder, chunks = [];
let source, comp, eq, reverb, delay;

async function setup() {
  audioCtx = new AudioContext({sampleRate: 44100});
  let stream = await navigator.mediaDevices.getUserMedia({audio: true});
  
  // AUDIO CHAIN
  source = audioCtx.createMediaStreamSource(stream);
  
  // 1. EQ - NF clarity
  eq = audioCtx.createBiquadFilter();
  eq.type = "peaking"; eq.frequency.value = 5000; eq.gain.value = 6;
  
  // 2. COMPRESSION - makes it loud and upfront
  comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 20; comp.ratio.value = 12;
  comp.attack.value = 0.003; comp.release.value = 0.1;
  
  // 3. REVERB - tiny room
  reverb = audioCtx.createConvolver();
  fetch('https://cdn.jsdelivr.net/gh/mohayonao/web-audio-convolver@master/impulses/irroom.wav')
    .then(r=>r.arrayBuffer()).then(b=>audioCtx.decodeAudioData(b)).then(buf=>reverb.buffer=buf);
  
  // 4. DELAY - slap
  delay = audioCtx.createDelay(); delay.delayTime.value = 0.12;
  
  // MIX
  let dry = audioCtx.createGain(); dry.gain.value = 1;
  let wet = audioCtx.createGain(); wet.gain.value = 0.08;
  
  source.connect(eq).connect(comp);
  comp.connect(dry);
  comp.connect(reverb).connect(wet);
  comp.connect(delay).connect(wet);
  dry.connect(audioCtx.destination);
  wet.connect(audioCtx.destination);
  
  // RECORDER - records the PROCESSED sound
  let dest = audioCtx.createMediaStreamDestination();
  dry.connect(dest); wet.connect(dest);
  
  mediaRecorder = new MediaRecorder(dest.stream, {mimeType: 'audio/webm'});
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = () => {
    let blob = new Blob(chunks, {type: 'audio/webm'});
    let url = URL.createObjectURL(blob);
    let dl = document.getElementById('dl');
    dl.href = url;
    dl.download = 'NF-Vocal.wav';
    dl.textContent = '⬇ DOWNLOAD YOUR WAV';
    document.getElementById('status').textContent = 'Done! Download above.';
  };
}

setup();

document.getElementById('record').onclick = () => {
  chunks = [];
  mediaRecorder.start();
  document.getElementById('record').disabled = true;
  document.getElementById('stop').disabled = false;
  document.getElementById('status').textContent = 'Recording...';
};

document.getElementById('stop').onclick = () => {
  mediaRecorder.stop();
  document.getElementById('record').disabled = false;
  document.getElementById('stop').disabled = true;
};
</script>
</body>
</html>
