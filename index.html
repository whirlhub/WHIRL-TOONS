<!DOCTYPE html>
<html>
<head>
<title>WHIRL TOONS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0f1123;color:white;text-align:center;font-family:Arial}
button{margin:5px;padding:12px 20px;font-size:16px;border:none;border-radius:10px;background:#8b5cf6;color:white}
#box{width:90%;height:400px;margin:10px auto;background:white;border:3px solid #8b5cf6;position:relative;overflow:hidden}
.char{width:60px;height:100px;position:absolute;background:#ffd93d;border-radius:50% 50% 10px 10px}
</style>
</head>
<body>
<h2>🌀 WHIRL TOONS ULTRA LITE</h2>

<button onclick="addChar()">Add Character</button>
<button onclick="addText()">Add Text</button>
<button onclick="clearAll()">Clear</button>

<div id="box"></div>

<script>
let box = document.getElementById('box');

function addChar(){
  let d = document.createElement('div');
  d.className = 'char';
  d.style.left = Math.random()*200+'px';
  d.style.top = Math.random()*200+'px';
  d.innerHTML = '😀';
  d.style.fontSize = '30px';
  d.style.textAlign = 'center';
  d.style.lineHeight = '60px';
  box.appendChild(d);
}

function addText(){
  let t = prompt("Type text:");
  if(t){
    let d = document.createElement('div');
    d.innerText = t;
    d.style.color = 'black';
    d.style.fontSize = '20px';
    d.style.fontWeight = 'bold';
    d.style.position = 'absolute';
    d.style.left = '20px';
    d.style.top = '20px';
    box.appendChild(d);
  }
}

function clearAll(){
  box.innerHTML = '';
}
</script>
</body>
  </html>
